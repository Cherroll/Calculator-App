<html>
    <head>
        <link rel="stylehseet" type="text/css" href="style.css">
    </head>
    <body>
    <p>Welcome.Please log in.</p> 

    <form>
        <label for="usernameinput">Username</label><input type="text" id="usernameinput"/><br/>
        <label for="passwordinput">Password</label><input type="password" id="passwordinput"/>
        <p id="message"></p>
        <br/><br/>
        <a href="#" onclick="verifyUser()">Log in</a>
    </form>

        <script>
         
         function verifyUser(){
            var username=document.getElementById("usernameinput").value;
            var password=document.getElementById("passwordinput").value;
            // for input box , we use 'value' instead of '.innerHTML'

            CheckUserCredentials(username,password);
            //You can call a function inside another function
         }

         function CheckUserCredentials(username,password){
            var systemUsername="Mpho";
            var systemPassword="1234";

            if(username==systemUsername && password==systemPassword){
                document.getElementById("message").innerHTML="Correct.Login in ...";
            } else {
                document.getElementById("message").innerHTML="Incorrect username or password...";

                }
            }
         
           

        </script>
    </body>
</html>
